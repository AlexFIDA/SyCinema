<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyCinema | Онлайн-кинотеатр</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">🎬 SyCinema</div>
        <nav>
            <a href="/login" class="btn-login">Вход</a>
            <a href="/register" class="btn-register">Регистрация</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Смотри фильмы вместе с друзьями</h1>
            <p>Выбирай кино, создавай комнату и наслаждайся синхронным просмотром.</p>
        </section>

        <h2>Доступные фильмы</h2>
        <div class="movies-grid">
            <div class="movie-card">
                <div class="movie-poster">🎥</div>
                <div class="movie-info">
                    <h3>Тестовый фильм</h3>
                    <a href="/media/test_movie.mp4" target="_blank" class="btn-watch">Смотреть</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
