<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои закладки | SyCinema</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo"><a href="/" style="color: inherit; text-decoration: none;">🍿 SyCinema</a></div>
        <nav style="display: flex; gap: 15px; align-items: center;">
            <a href="/" style="color: white; text-decoration: none; margin-right: 15px;">На главную</a>
            <span style="color: #aaa;">Привет, <strong style="color: white;">{{ .Username }}</strong>!</span>
            <form action="/logout" method="GET" style="margin: 0;">
                <button type="submit" class="btn-login">Выйти</button>
            </form>
        </nav>
    </header>

    <main style="padding: 40px; text-align: center;">
        <h1>Мои закладки</h1>
        <p style="color: #aaa;">Здесь хранятся твои любимые мультсериалы.</p>
        
        <div class="series-grid" style="margin-top: 40px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            {{ range .Series }}
            <a href="/series?id={{ .ID }}&favorites=true" style="text-decoration: none; color: inherit;">
                <div class="series-card" style="width: 200px; background: #222; border-radius: 8px; overflow: hidden; transition: transform 0.2s;">
                    <img src="{{ .PosterURL }}" alt="{{ .Title }}" style="width: 100%; height: 280px; object-fit: cover; background-color: #333;">
                    <div style="padding: 15px;">
                        <h3 style="margin: 0; font-size: 16px;">{{ .Title }}</h3>
                        <p style="color: #888; font-size: 12px; margin-top: 5px;">{{ .ReleaseYear }}</p>
                    </div>
                </div>
            </a>
            {{ else }}
                <div style="margin-top: 40px;">
                    <p style="color: #888; font-size: 18px;">Вы еще ничего не добавили в закладки.</p>
                    <a href="/" class="btn-register" style="display: inline-block; margin-top: 20px; text-decoration: none;">Выбрать сериал</a>
                </div>
            {{ end }}
        </div>
    </main>
</body>
</html>
