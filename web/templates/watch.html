<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смотреть {{ .Series.Title }} | SyCinema</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo"><a href="/" style="color: inherit; text-decoration: none;">🍿 SyCinema</a></div>
        <nav>
            <a href="/series?id={{ .Series.ID }}" class="btn-login" style="text-decoration: none;">Назад к сериалу</a>
        </nav>
    </header>

    <main style="max-width: 900px; margin: 40px auto; text-align: center;">
        <h2 style="margin-bottom: 10px;">{{ .Series.Title }}</h2>
        <p style="color: #aaa; margin-top: 0; margin-bottom: 30px;">Сезон {{ .Episode.Season }}, Серия {{ .Episode.EpisodeNum }} — {{ .Episode.Title }}</p>
        
        <video id="videoPlayer" controls style="width: 100%; border-radius: 10px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <source src="{{ .Episode.VideoPath }}" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>

        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 10px; align-items: center;">
            <span style="color: #888; font-size: 14px;">Скорость:</span>
            <button class="btn-speed" data-speed="0.5" style="padding: 5px 10px; background: #333; border: none; color: white; border-radius: 5px; cursor: pointer;">0.5x</button>
            <button class="btn-speed" data-speed="1.0" style="padding: 5px 10px; background: #e50914; border: none; color: white; border-radius: 5px; cursor: pointer;">1x</button>
            <button class="btn-speed" data-speed="1.25" style="padding: 5px 10px; background: #333; border: none; color: white; border-radius: 5px; cursor: pointer;">1.25x</button>
            <button class="btn-speed" data-speed="1.5" style="padding: 5px 10px; background: #333; border: none; color: white; border-radius: 5px; cursor: pointer;">1.5x</button>
            <button class="btn-speed" data-speed="2.0" style="padding: 5px 10px; background: #333; border: none; color: white; border-radius: 5px; cursor: pointer;">2x</button>
        </div>
    </main>

    <script>
        const video = document.getElementById('videoPlayer');
        const speedBtns = document.querySelectorAll('.btn-speed');

        speedBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // Сбрасываем цвет всех кнопок на серый
                speedBtns.forEach(b => b.style.background = '#333');
                
                // Делаем нажатую кнопку красной (активной)
                this.style.background = '#e50914';
                
                // Читаем атрибут data-speed и применяем скорость к видео
                video.playbackRate = parseFloat(this.getAttribute('data-speed'));
            });
        });
    </script>
</body>
</html>
