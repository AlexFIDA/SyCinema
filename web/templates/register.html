<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | SyCinema</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background-color: #1a1a1a; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .auth-container h2 { margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
        .form-group input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background-color: #222; color: white; font-size: 16px; }
        .btn-submit { width: 100%; padding: 12px; margin-top: 10px; background-color: #e50914; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-submit:hover { background-color: #f40612; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><a href="/" style="color: inherit; text-decoration: none;">🎬 SyCinema</a></div>
    </header>

    <div class="auth-container">
        <h2>Создать аккаунт</h2>
        <form action="/register" method="POST">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-submit">Зарегистрироваться</button>
        </form>
    </div>
</body>
</html>
